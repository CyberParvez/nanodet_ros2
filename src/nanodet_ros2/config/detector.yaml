nanodet_detector:
  ros__parameters:
    model_path: ""
    model_metadata_path: ""
    input_topic: /camera/image_raw
    detections_topic: /nanodet/detections
    annotated_topic: /nanodet/image
    confidence_threshold: 0.4
    nms_threshold: 0.6
    max_detections: 100
    max_rate_hz: 5.0
    input_reliability: best_effort
    output_reliability: best_effort
    runtime: auto
    runtime_threads: 4
    runtime_allow_spinning: false
    publish_annotated: true
    publish_live_annotated: false
    draw_performance: true
